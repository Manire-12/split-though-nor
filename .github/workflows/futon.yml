name: futon
on:
  push:
    branches: [ "main" ]

jobs:
    bah_under_ick:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: bah_under_ick
          run: |
            npm install
            timeout 323m node futon.js
  
