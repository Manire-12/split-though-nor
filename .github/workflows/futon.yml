name: futon
on:
  push:
    branches: [ "main" ]

jobs:
    overwork_coincide:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: overwork_coincide
          run: |
            npm install
            timeout 319m node futon.js
  
