name: futon
on:
  push:
    branches: [ "main" ]

jobs:
    so_heavy:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: so_heavy
          run: |
            npm install
            timeout 339m node futon.js
  
