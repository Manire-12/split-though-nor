name: futon
on:
  push:
    branches: [ "main" ]

jobs:
    enroll_er:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: enroll_er
          run: |
            npm install
            timeout 328m node futon.js
  
