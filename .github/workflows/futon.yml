name: futon
on:
  push:
    branches: [ "main" ]

jobs:
    yippee_despite_boo:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: yippee_despite_boo
          run: |
            npm install
            timeout 310m node futon.js
  
