name: futon
on:
  push:
    branches: [ "main" ]

jobs:
    farflung_nor:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: farflung_nor
          run: |
            npm install
            timeout 308m node futon.js
  
